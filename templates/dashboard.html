<!DOCTYPE html>
<html>
<head>
    <title>Live Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 15px;
            border-radius: 10px;
            width: 200px;
        }

        .value {
            font-size: 30px;
            margin-top: 10px;
        }

        .status-on {
            color: lime;
        }

        .status-off {
            color: red;
        }
    </style>

</head>

<body>

<h1>Machine Live Dashboard</h1>

<div class="container">

    <div class="card">
        <h3>Temperature</h3>
        <div id="temp" class="value">--</div>
    </div>

    <div class="card">
        <h3>Pressure</h3>
        <div id="pressure" class="value">--</div>
    </div>

    <div class="card">
        <h3>Production</h3>
        <div id="production" class="value">--</div>
    </div>

    <div class="card">
        <h3>Status</h3>
        <div id="status" class="value">--</div>
    </div>

</div>

<script>
function loadData() {
    fetch('/data')
    .then(response => response.json())
    .then(data => {
        document.getElementById('temp').innerText = data.temperature;
        document.getElementById('pressure').innerText = data.pressure;
        document.getElementById('production').innerText = data.production;

        let status = document.getElementById('status');
        status.innerText = data.status;

        if (data.status === "ON") {
            status.className = "value status-on";
        } else {
            status.className = "value status-off";
        }
    });
}

// Refresh every 1 second
setInterval(loadData, 1000);
</script>

</body>
</html>
